<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Courier+Prime&display=swap" rel="stylesheet"/>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LXLV473CZP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LXLV473CZP');
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #141418;
      --accent: #e8c97a;
      --text: #e8e4dc;
      --muted: #6b6660;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier Prime', monospace;
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(232, 201, 122, 0.15);
      border-radius: 2px;
      padding: 3rem 3.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 340px;
      box-shadow: 0 8px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .vinyl-wrap { position: relative; width: 120px; height: 120px; }

    .vinyl {
      width: 120px; height: 120px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #1a1a1a 18%, transparent 18%),
        repeating-radial-gradient(circle at 50% 50%, #1c1c1e 0px, #111113 2px, #1c1c1e 4px);
      box-shadow: 0 4px 30px rgba(0,0,0,0.6);
      animation: spin 4s linear infinite;
      animation-play-state: paused;
      transition: opacity 0.3s;
    }

    .vinyl::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px #111113, 0 0 0 5px rgba(232,201,122,0.2);
    }

    .vinyl.spinning { animation-play-state: running; }
    .vinyl.dim { opacity: 0.25; filter: grayscale(1); }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .waveform { display: flex; align-items: center; gap: 3px; height: 28px; }

    .bar {
      width: 3px; border-radius: 2px;
      background: var(--accent);
      opacity: 0.3;
      transform-origin: bottom;
      transition: opacity 0.4s;
    }

    .bar.active {
      opacity: 1;
      animation: bounce var(--d, 0.6s) ease-in-out infinite alternate;
    }

    @keyframes bounce {
      from { transform: scaleY(0.2); }
      to   { transform: scaleY(1); }
    }

    .track-info { text-align: center; }

    .track-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      transition: color 0.3s;
    }

    .track-artist {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* Play button */
    .play-btn {
      position: relative;
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s, border-color 0.3s;
      outline: none;
    }

    .play-btn::before {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(232,201,122,0.12);
    }

    .play-btn:hover { background: rgba(232,201,122,0.07); transform: scale(1.05); }
    .play-btn:active { transform: scale(0.96); }

    .play-icon {
      width: 0; height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-left: 18px solid var(--accent);
      margin-left: 4px;
      transition: opacity 0.3s;
    }

    /* Hint message below button */
    .hint {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      min-height: 1rem;
      text-align: center;
      transition: opacity 0.4s;
      opacity: 0;
    }

    .hint.visible { opacity: 1; }

    /* Subtle shake animation on button when "buffering" */
    @keyframes wiggle {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }

    .play-btn.wiggle { animation: wiggle 0.3s ease; }
  </style>
</head>
<body>

<div class="scene">
  <div class="card" id="card">
    <div class="vinyl-wrap">
      <div class="vinyl" id="vinyl"></div>
    </div>
    <div class="waveform" id="waveform"></div>
    <div class="track-info">
      <div class="track-title" id="track-title">Nocturne in D Minor</div>
      <div class="track-artist">Original Composition</div>
    </div>
    <button class="play-btn" id="play-btn" aria-label="Play">
      <div class="play-icon"></div>
    </button>
    <div class="hint" id="hint"></div>
  </div>
</div>

<script>
  // Waveform bars
  const waveform = document.getElementById('waveform');
  const heights = [8,14,20,26,22,16,28,18,24,12,20,16,22,10,18];
  const bars = heights.map((h, i) => {
    const b = document.createElement('div');
    b.className = 'bar';
    b.style.setProperty('--d', (0.4 + Math.random() * 0.5).toFixed(2) + 's');
    b.style.height = h + 'px';
    b.style.animationDelay = (i * 0.05).toFixed(2) + 's';
    waveform.appendChild(b);
    return b;
  });

  // Fool messages shown after each click
  const foolMessages = [
    "Buffering... click again to resume",
    "Connection dropped. Try once more!",
    "Almost there... one more click!",
    "Server busy. Click to retry.",
    "Audio codec loading... click to continue",
    "Tap again to confirm playback",
    "Still loading... click once more!",
    "Just a sec — click to reconnect",
  ];

  let clickCount = 0;
  let lastSpin = null;

  const playBtn = document.getElementById('play-btn');
  const vinyl   = document.getElementById('vinyl');
  const hint    = document.getElementById('hint');
  const title   = document.getElementById('track-title');

  playBtn.addEventListener('click', () => {
    clickCount++;

    // ── GA event: every single click with count ──
    gtag('event', 'play_button_clicked', {
      event_category: 'music_player',
      event_label: 'Play button clicked',
      click_count: clickCount,        // custom dimension — how many times this session
      value: clickCount
    });

    // First click gets its own event so you can count unique first-clickers
    if (clickCount === 1) {
      gtag('event', 'play_first_click', {
        event_category: 'music_player',
        event_label: 'First click this session'
      });
    }

    // Brief spin to look like it's trying
    vinyl.classList.remove('dim');
    vinyl.classList.add('spinning');
    bars.forEach(b => b.classList.add('active'));
    if (lastSpin) clearTimeout(lastSpin);

    lastSpin = setTimeout(() => {
      vinyl.classList.remove('spinning');
      vinyl.classList.add('dim');
      bars.forEach(b => b.classList.remove('active'));
    }, 800);

    // Wiggle button
    playBtn.classList.remove('wiggle');
    void playBtn.offsetWidth; // reflow to restart animation
    playBtn.classList.add('wiggle');

    // Show a fool message
    const msg = foolMessages[(clickCount - 1) % foolMessages.length];
    hint.textContent = msg;
    hint.classList.add('visible');
  });
</script>
</body>
</html>
