<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Debug Music Page</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;font-family:Arial;background:#111;color:#fff;text-align:center;padding:20px}
button{padding:14px 28px;font-size:18px}
</style>
</head>
<body>
<div id="app">Loading...</div>

<script>
const app = document.getElementById("app");

const supabaseUrl = "https://jhfqjmpjmjuzrpgqzfnz.supabase.co";
const supabaseKey = "sb_publishable_zscaRA42u3LhgWdJ73zuOw_TFkuDorT";

async function start(){
 try{
   if(!window.supabase){
     app.innerHTML = "Supabase library not loaded";
     return;
   }

   const client = window.supabase.createClient(supabaseUrl, supabaseKey);

   const {data, error} = await client
     .from("music_state")
     .select("*");

   if(error){
     app.innerHTML = "DB Error:<br>" + error.message;
     return;
   }

   if(!data || data.length === 0){
     app.innerHTML = "No row found in music_state table";
     return;
   }

   const row = data[0];

   if(row.removed){
     app.innerHTML = "<h1 style='color:black;background:white;padding:20px'>The music is removed by the author</h1>";
     document.body.style.background="white";
     return;
   }

   app.innerHTML = '<button onclick="removeMusic()">▶ Play Music</button>';

   window.removeMusic = async function(){
     await client.from("music_state").update({removed:true}).eq("id", row.id);
     location.reload();
   };

 }catch(e){
   app.innerHTML = "JS Error:<br>" + e.message;
 }
}

start();
</script>
</body>
</html>
